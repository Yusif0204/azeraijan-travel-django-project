{% load static %}
<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8" />
    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🇦🇿</text></svg>" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% block title %}Азербайджан — города и места{% endblock %}</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght=400;500;600;700;800&family=Playfair+Display:wght=600;700&display=swap" rel="stylesheet" />
    <link rel="stylesheet" href="{% static 'css/index.css' %}" />
</head>
<body>
    <div class="app">
        <header class="header">
            <a href="{% url 'home' %}" class="logo" style="text-decoration: none;">
                <span class="logo-flag">🇦🇿</span>
                <div>
                    <span class="logo-title">Azerbaijan Travel</span>
                    <span class="logo-sub">Путеводитель по регионам</span>
                </div>
            </a>
            <div class="header-actions">
                <span class="header-badge">Управление через <strong>Админку</strong></span>
            </div>
        </header>

        {% block content %}
        {% endblock %}

        <footer class="footer">
            <p>База данных SQLite · Сервер на Python (Django) · Мой Fullstack проект</p>
        </footer>
    </div>
</body>
</html>
